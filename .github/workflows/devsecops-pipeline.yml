name: DevSecOps Pipeline

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run basic health check
        run: |
          python -c "from app import create_app; app = create_app(); print('App loaded successfully')"

  sast-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Bandit SAST Scanner
        run: |
          pip install bandit pbr
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll

  sca-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Safety SCA Scanner
        run: |
          pip install safety
          safety check -r requirements.txt --output text || echo "Safety scan complete - vulnerabilities found but continuing"

  container-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image for scanning
        run: |
          docker build -t ecommerce-app:latest .

      - name: Run Trivy Container Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          severity: 'CRITICAL,HIGH'

  iac-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Run Checkov IaC Scanner
        run: |
          pip install checkov
          checkov -d terraform/ --framework terraform --output cli || echo "Checkov scan complete"

  dast-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app
        run: |
          python run.py &
          sleep 5

      - name: Run OWASP ZAP DAST Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
          artifact_name: 'zap-report'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html