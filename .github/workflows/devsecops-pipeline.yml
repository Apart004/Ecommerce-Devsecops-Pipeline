name: DevSecOps Pipeline

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run basic health check
        run: |
          python -c "from app import create_app; app = create_app(); print('App loaded successfully')"

      - name: Run Bandit SAST Scanner
        run: |
          pip install bandit pbr
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll

      - name: Run Safety SCA Scanner
        run: |
          pip install safety==2.3.5
          safety check -r requirements.txt --output text || true

      - name: Build Docker image for scanning
        run: |
          docker build -t ecommerce-app:latest .

      - name: Run Trivy Container Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ecommerce-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          severity: 'CRITICAL,HIGH'